<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Task Tracker</title>

        <link rel="stylesheet" href="../CSS/style.css">
    </head>

    <body>
        <header>
            <div class="header-left">
                <h1>Task Tracker</h1>
                <p>Sprint Planning Tool</p>
            </div>
            <button id="addTaskBtn">Add Task</button>
        </header>

        <div class="stats">
            <div class="stat backlog">
                <span>Backlog</span>
                <span id="stat-num" id="stat-backlog">0</span>
            </div>
            <div class="stat doing">
                <span>Doing</span>
                <span id="stat-num" id="stat-doing">0</span>
            </div>
            <div class="stat done">
                <span>Done</span>
                <span id="stat-num" id="stat-done">0</span>
            </div>
            <div class="stat total">
                <span>Total</span>
                <span id="stat-num" id="stat-total">0</span>
            </div>
        </div>

        <script src="../JavaScript/script.js"></script>
    </body>
</html>
