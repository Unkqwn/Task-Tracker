<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Task Tracker</title>

        <link rel="stylesheet" href="../CSS/style.css">
    </head>

    <body>
        <header>
            <div class="header-left">
                <h1>Task Tracker</h1>
                <p>Sprint Planning Tool</p>
            </div>
            <button id="addTaskBtn">Add Task</button>
        </header>

        <div class="stats">
            <div class="stat backlog">
                <span>Backlog</span>
                <span id="stat-num" id="stat-backlog">0</span>
            </div>
            <div class="stat doing">
                <span>Doing</span>
                <span id="stat-num" id="stat-doing">0</span>
            </div>
            <div class="stat done">
                <span>Done</span>
                <span id="stat-num" id="stat-done">0</span>
            </div>
            <div class="stat total">
                <span>Total</span>
                <span id="stat-num" id="stat-total">0</span>
            </div>
        </div>

        <div class="board">
            <div class="column" data-col="backlog">
                <div class="column-header">
                    <span class="col-name">Backlog</span>
                    <span class="col-count" id="count-backlog">0</span>
                </div>
                <div class="column-content" id="backlog-content"></div>
            </div>
            <div class="column" data-col="doing">
                <div class="column-header">
                    <span class="col-name">Doing</span>
                    <span class="col-count" id="count-doing">0</span>
                </div>
                <div class="column-content" id="doing-content"></div>
            </div>
            <div class="column" data-col="done">
                <div class="column-header">
                    <span class="col-name">Done</span>
                    <span class="col-count" id="count-done">0</span>
                </div>
                <div class="column-content" id="done-content"></div>
            </div>
        </div>

        <script src="../JavaScript/script.js"></script>
    </body>
</html>
